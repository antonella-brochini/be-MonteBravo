spring.application.name=be
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jackson.time-zone=America/Montevideo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sendgrid.api-key=${SENDGRID_API_KEY}
CLOUDINARY_URL=${CLOUDINARY_URL}

mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.claveSecretaMP=${MERCADOPAGO_CLAVE_SECRETA_MP}



spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}


spring.security.user.name=${BASIC_USER}
spring.security.user.password=${BASIC_PASS}
logging.level.org.springframework.security=DEBUG

spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=1780000000


# Google OAuth2 configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

frontend.url=${FRONTEND_URL}
#frontend.url=http://localhost:3000
